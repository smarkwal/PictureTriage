version=1.0.0-SNAPSHOT
group=net.markwalder

# Configuration cache is disabled because org.openjfx.javafxplugin 0.1.0 is not compatible with it.
# The plugin accesses Task.extensions and SourceSetContainer at execution time, which Gradle's
# configuration cache forbids. Re-enable this once a compatible version of the plugin is available.
org.gradle.configuration-cache=false
org.gradle.caching=true
